name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run SwiftLint
        run: |
          if command -v swiftlint >/dev/null; then
            swiftlint lint --strict
          else
            echo "SwiftLint not installed, skipping."
          fi

  build-and-test:
    name: Build and Test (macOS)
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Swift Version
        run: swift --version

      - name: Cache Swift PM Dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build Debug
        run: swift build

      - name: Run Tests
        run: swift test

      # package_dmg.sh already runs `swift build -c release` internally, so we
      # skip the redundant standalone release build step here.
      - name: Package App Bundle
        run: |
          ./scripts/package_dmg.sh
        env:
          APP_VERSION: "CI-${{ github.run_number }}"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QuotaBar-CI-${{ github.sha }}
          path: |
            dist/QuotaBar-macOS.zip
            dist/QuotaBar.dmg
          retention-days: 7
