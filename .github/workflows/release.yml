name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish Release
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Cache Swift PM Dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION. Must be X.Y.Z"
            exit 1
          fi
          echo "$VERSION" > VERSION
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify CI passed on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          echo "Checking CI status for $SHA..."
          STATUS=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
            --jq '[.check_runs[] | select(.name == "Build and Test (macOS)") | .conclusion] | first // "none"')
          if [ "$STATUS" != "success" ]; then
            echo "::error::CI check 'Build and Test (macOS)' did not pass on $SHA (status: $STATUS). Aborting release."
            exit 1
          fi
          echo "CI passed."

      - name: Build & Test
        run: |
          swift build
          swift test

      - name: Package DMG + ZIP
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/package_dmg.sh

      - name: Generate latest.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
          OWNER_REPO: ${{ github.repository }}
        run: python3 scripts/make_latest_json.py

      - name: Validate latest.json
        run: python3 scripts/validate_latest_json.py dist/latest.json "${{ steps.version.outputs.version }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          echo "Publishing release $VERSION..."
          gh release create "$VERSION" \
            dist/QuotaBar.dmg \
            dist/QuotaBar-macOS.zip \
            dist/latest.json \
            --title "$VERSION" \
            --generate-notes || \
          gh release upload "$VERSION" \
            dist/QuotaBar.dmg \
            dist/QuotaBar-macOS.zip \
            dist/latest.json \
            --clobber

      - name: Post-Publish Verification
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER_REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: python3 scripts/check_published_latest.py
